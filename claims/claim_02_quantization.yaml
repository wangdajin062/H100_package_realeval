id: CLAIM-02
hypothesis: "INT4 quantisation preserves F1 within 1 point of the fp16 scheme."
experiment: exp11
evidence_path: [schemes]
independent_variable: quant_scheme
dependent_variable: f1
control: [dataset, seed]
compare:
  treatment: int4
  baseline: fp16
acceptance:
  - "mean_diff <= 0.01"       # F1 drop under 1 point
seeds: 5
threshold_origin:
  mean_diff:
    value: 0.01
    source: "convention"  # industry-standard 1-percentage-point tolerance for quantization F1 preservation
    note: "1-point F1 tolerance is a common convention in model compression literature. Not calibrated from this project's specific data distribution."
