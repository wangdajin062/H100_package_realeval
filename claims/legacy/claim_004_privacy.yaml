# CLAIM-004: LDP Gaussian mechanism provides meaningful privacy protection
id: CLAIM-004
status: legacy  # pre-v2 claim format; maintained for historical traceability
format_note: "Evaluated by runner/claim_runner.py via audit.evidence_graph, NOT by experiments/claim_engine.py"

hypothesis: >
  Applying (epsilon, delta)-DP Gaussian noise to training features reduces
  speaker identification accuracy below 50% (near chance) at epsilon <= 1.5,
  while classification F1 remains above 0.85.

independent_variables:
  - epsilon  # privacy budget

dependent_variables:
  - speaker_id_accuracy
  - f1

controls:
  - dataset: TAF-28k
  - delta: 1e-5
  - noise_multiplier: 1.0
  - clip_bound: 3.0
  - seed: 42

acceptance:
  speaker_id_accuracy: "<0.5"   # Near chance level at epsilon=1.5
  f1_min: ">0.85"               # Utility preserved above 0.85
threshold_origin:
  speaker_id_accuracy:
    value: 0.5
    source: "theoretical"  # chance-level accuracy for binary speaker identification
    note: "0.5 is the theoretical chance level for balanced binary classification. Plausibly defensible without empirical calibration."
  f1_min:
    value: 0.85
    source: "paper_hypothesis"
    note: "0.85 F1 floor for utility preservation is set by the paper; not calibrated from a utility-privacy Pareto frontier."
